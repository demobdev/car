<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!-- SVG for modern browsers, sized PNGs for fallback, apple-touch-icon for iOS -->
    <link rel="icon" type="image/png" href="/assets/cartographica-logo.png" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/cartographica-logo.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <title>Cartographica — Custom Map Poster Creator</title>

    <!-- Primary SEO -->
    <meta
      name="description"
      content="Design custom, print-ready map posters for any city or location. Choose from dozens of curated themes, customize typography, and export as PNG, PDF, or SVG."
    />
    <meta
      name="keywords"
      content="custom map poster creator, map poster generator, map wallpaper creator, map art maker, city map poster, print map poster, map art generator, custom map print, Cartographica"
    />
    <meta name="robots" content="index, follow" />
    <meta
      name="google-site-verification"
      content="%VITE_GOOGLE_SITE_VERIFICATION%"
    />
    <meta name="author" content="Cartographica" />
    <meta name="copyright" content="Cartographica" />
    <link rel="canonical" href="https://cartographica.app" />

    <!-- Theme colour -->
    <meta name="theme-color" content="#1a3a2a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Cartographica" />
    <meta name="msapplication-TileColor" content="#1a3a2a" />
    <link rel="mask-icon" href="/assets/cartographica-logo.png" color="#1a3a2a" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cartographica" />
    <meta
      property="og:title"
      content="Cartographica — Custom Map Poster Creator"
    />
    <meta
      property="og:description"
      content="Design custom, print-ready map posters for any city or location. Choose from dozens of curated themes, customize typography, and export as PNG, PDF, or SVG."
    />
    <meta property="og:url" content="https://cartographica.app" />
    <meta
      property="og:image"
      content="https://cartographica.app/assets/banner.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Cartographica — custom map poster creator" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Cartographica — Custom Map Poster Creator"
    />
    <meta
      name="twitter:description"
      content="Design custom, print-ready map posters for any city or location. Choose from dozens of curated themes, customize typography, and export as PNG, PDF, or SVG."
    />
    <meta
      name="twitter:image"
      content="https://cartographica.app/assets/banner.png"
    />
    <meta name="twitter:image:alt" content="Cartographica — custom map poster creator" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Cartographica",
        "alternateName": [
          "Cartographica Map Poster Creator",
          "Cartographica Custom Map Print Studio"
        ],
        "url": "https://cartographica.app",
        "description": "Design custom, print-ready map posters for any city or location. Choose from dozens of curated themes, customize typography, and export as PNG, PDF, or SVG.",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires a modern web browser",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "screenshot": "https://cartographica.app/assets/banner.png",
        "featureList": [
          "Custom map poster creator for any city or location",
          "Map wallpaper generator with curated themes",
          "High-resolution PNG, PDF, and SVG export",
          "Powered by OpenStreetMap data",
          "Dozens of curated map themes",
          "Custom colour palettes",
          "Typography controls with Google Fonts",
          "No sign-up or account required",
          "Works entirely in your browser"
        ],
        "keywords": "custom map poster creator, map poster generator, map art maker, city map print, Cartographica",
        "creator": {
          "@type": "Organization",
          "name": "Cartographica",
          "url": "https://cartographica.app"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
